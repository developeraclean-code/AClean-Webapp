<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AClean — Modul Project (Mockup Interaktif v2)</title>
<style>
  :root{
    --bg:#0a0f1e; --surface:#0d1526; --card:#111827; --border:#1e2d4a;
    --text:#e2e8f0; --muted:#64748b; --accent:#38bdf8; --green:#22c55e;
    --yellow:#f59e0b; --red:#ef4444; --ara:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}
  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:8px;padding:6px 10px 14px;border-bottom:1px solid var(--border);margin-bottom:10px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--ara));display:flex;align-items:center;justify-content:center;font-weight:800;color:#04121f}
  .brand .t1{font-weight:800;font-size:14px}
  .brand .t2{font-size:11px;color:var(--muted)}
  .nav button{width:100%;text-align:left;background:transparent;border:none;color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:2px}
  .nav button:hover{background:#0f1b30}
  .nav button.active{background:#15233f;color:var(--accent);font-weight:700}
  .nav button .ic{width:18px;text-align:center}
  .nav button .lock{margin-left:auto;font-size:10px}
  .nav .group-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:12px 12px 4px}
  .back{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
  .back button{color:var(--muted)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:5}
  .topbar h1{font-size:17px;font-weight:800}
  .topbar .sub{font-size:12px;color:var(--muted)}
  .spacer{flex:1}
  select.proj{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px}
  .role-switch{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px}
  .role-switch span{font-size:11px;color:var(--muted);padding-left:6px}
  .role-switch button{background:transparent;border:none;color:var(--text);padding:6px 11px;border-radius:7px;cursor:pointer;font-size:12px}
  .role-switch button.active{background:var(--accent);color:#04121f;font-weight:700}
  .content{padding:22px;max-width:1220px}
  .grid{display:grid;gap:14px}
  .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:980px){.g3,.g4,.g2{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
  .card h3{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
  .stat{font-size:22px;font-weight:800}
  .stat.green{color:var(--green)} .stat.red{color:var(--red)} .stat.accent{color:var(--accent)} .stat.yellow{color:var(--yellow)}
  .delta{font-size:12px;color:var(--muted);margin-top:4px}
  .section-title{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
  .section-title h2{font-size:18px;font-weight:800}
  .btn{background:var(--accent);color:#04121f;border:none;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn.green{background:var(--green)} .btn.red{background:var(--red);color:#fff} .btn.yellow{background:var(--yellow);color:#04121f}
  .btn.sun{background:#fbbf24;color:#3a2a00} .btn.moon{background:#6366f1;color:#fff}
  .btn.sm{padding:6px 10px;font-size:12px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  tbody tr:hover td{background:#0f1b30}
  tr.clickable{cursor:pointer}
  tr.subhead td{background:#0f1b30;color:var(--ara);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .pill.green{background:rgba(34,197,94,.15);color:var(--green)}
  .pill.yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
  .pill.red{background:rgba(239,68,68,.15);color:var(--red)}
  .pill.accent{background:rgba(56,189,248,.15);color:var(--accent)}
  .pill.gray{background:rgba(100,116,139,.18);color:var(--muted)}
  .pill.ara{background:rgba(167,139,250,.15);color:var(--ara)}
  .cat-chip{display:inline-block;padding:5px 11px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
  .cat-chip.active{background:var(--ara);color:#160b2e;border-color:var(--ara)}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .between{justify-content:space-between}
  .photos{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  @media(max-width:700px){.photos{grid-template-columns:repeat(3,1fr)}}
  .photo{position:relative;aspect-ratio:1;background:linear-gradient(135deg,#1b2740,#0f1b30);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;overflow:hidden}
  .photo.add{border-style:dashed;cursor:pointer;color:var(--accent)}
  .photo .stamp{position:absolute;left:3px;right:3px;bottom:3px;font-size:7.5px;line-height:1.25;background:rgba(0,0,0,.6);color:#e2e8f0;border-radius:3px;padding:1px 3px;text-align:left}
  .perhatian{display:flex;flex-direction:column;gap:8px}
  .perhatian .item{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 10px;border-radius:9px;background:#0f1b30;border:1px solid var(--border)}
  .check-row{display:flex;align-items:center;gap:8px;padding:3px 0}
  .card.big{padding:20px}
  .card.big .stat{font-size:30px}
  .fin-hero{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:16px 20px;background:linear-gradient(135deg,#15233f,#0f1b30);border:1px solid var(--border);border-radius:14px}
  .fin-hero .nm{font-size:21px;font-weight:800}
  .ai-box{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.35);border-radius:10px;padding:12px 14px;margin-bottom:12px}
  .ai-box h4{color:var(--ara);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .ai-anom{color:#fca5a5}
  canvas.sigpad{background:#fff;border-radius:8px;width:100%;touch-action:none;cursor:crosshair;border:1px solid var(--border)}
  .checks{display:flex;flex-direction:column;gap:2px;max-height:150px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px}
  .checks label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;color:var(--text)}
  .checks input{width:auto}
  table.gridedit{width:100%;border-collapse:collapse;margin-bottom:6px}
  table.gridedit th{font-size:10px;padding:4px 6px;color:var(--muted)}
  table.gridedit td{padding:3px 4px;border-bottom:1px solid var(--border)}
  table.gridedit tbody{counter-reset:r}
  table.gridedit tbody tr{counter-increment:r}
  table.gridedit .rownum{color:var(--muted);font-size:11px;text-align:center}
  table.gridedit .rownum::before{content:counter(r)}
  .cell{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 7px;font-size:12px;font-family:inherit}
  .cell-chk{width:16px;height:16px}
  .minicard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;min-width:140px}
  .minicard .l{font-size:11px;color:var(--muted)}
  .minicard .v{font-size:18px;font-weight:800;margin-top:2px}
  .minicard .v.red{color:var(--red)} .minicard .v.accent{color:var(--accent)} .minicard .v.yellow{color:var(--yellow)} .minicard .v.green{color:var(--green)}
  .bar{height:8px;background:#0f1b30;border-radius:999px;overflow:hidden;margin-top:6px}
  .bar > i{display:block;height:100%;background:var(--accent)}
  .muted{color:var(--muted)}
  .tag{font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:3px 8px;display:inline-block}
  .hidden{display:none!important}
  .note{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:#bae6fd;margin-bottom:14px}
  .alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.45);border-radius:10px;padding:10px 14px;font-size:13px;color:#fecaca;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .alert.warn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.45);color:#fde68a}
  .denied{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:24px;text-align:center;color:var(--red)}
  .legend{font-size:11px;color:var(--muted);margin-top:10px}
  hr{border:none;border-top:1px solid var(--border);margin:8px 0}
  .kv{display:flex;justify-content:space-between;padding:5px 0}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(2,6,15,.7);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:20px}
  .modal.wide{max-width:760px}
  .modal h3{font-size:16px;font-weight:800;margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit}
  .field textarea{min-height:64px;resize:vertical}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--green);color:#04121f;font-weight:700;padding:10px 18px;border-radius:10px;z-index:80;opacity:0;transition:.25s;font-size:13px}
  .toast.show{opacity:1}
  /* paper (BAST PDF preview) */
  .paper{background:#f8fafc;color:#0f172a;border-radius:8px;padding:28px 30px;font-size:12.5px;line-height:1.55}
  .paper .ph{display:flex;justify-content:space-between;border-bottom:2px solid #0f172a;padding-bottom:10px;margin-bottom:14px}
  .paper .co{font-weight:800;font-size:16px;color:#0a3a52}
  .paper .co small{display:block;font-weight:400;color:#475569;font-size:10.5px}
  .paper h4{text-align:center;font-size:14px;text-transform:uppercase;letter-spacing:.04em;margin:6px 0 2px}
  .paper .docno{text-align:center;color:#475569;margin-bottom:14px;font-size:11px}
  .paper table{width:100%;border-collapse:collapse;margin:8px 0}
  .paper th,.paper td{border:1px solid #cbd5e1;padding:6px 8px;color:#0f172a;font-size:12px;text-transform:none;letter-spacing:0}
  .paper th{background:#e2e8f0;color:#0f172a}
  .paper .sign{display:flex;justify-content:space-between;margin-top:28px}
  .paper .sign div{text-align:center;width:45%}
  .paper .sign .line{margin-top:54px;border-top:1px solid #0f172a;padding-top:4px;font-weight:700}
  .paper .meta{display:flex;gap:24px;margin-bottom:8px}
  .paper .pf{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
  .paper .pf div{aspect-ratio:4/3;background:#e2e8f0;border:1px solid #cbd5e1;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:10px}
</style>
</head>

function calc(pid){
  const p=DB.projects.find(x=>x.id===pid);
  const dpList=DB.dp.filter(d=>d.projectId===pid);
  const dpTotal=dpList.reduce((s,d)=>s+d.jumlah,0);
  const byCat={}; EXP_CATS.forEach(c=>byCat[c]=0);
  DB.purchases.filter(x=>x.projectId===pid).forEach(x=> byCat[x.jenis==='Alat'?'Alat / Sewa Alat':'Material'] += x.total);
  DB.expenses.filter(x=>x.projectId===pid).forEach(x=> byCat[x.kategori]=(byCat[x.kategori]||0)+x.nominal);
  const aktualBiaya=Object.values(byCat).reduce((s,v)=>s+v,0);
  return {p,dpList,dpTotal,sisaTagihan:p.nilai-dpTotal,byCat,aktualBiaya,estProfit:p.nilai-p.rab,aktualProfit:p.nilai-aktualBiaya};
}
function budget(pid){
  const k=calc(pid); const p=k.p; const ratio=p.rab? k.aktualBiaya/p.rab : 0;
  const aktif=p.status!=='SELESAI'&&p.status!=='HOLD';
  return {ratio, warn:aktif&&ratio>=0.85&&ratio<1, crit:aktif&&ratio>=1, k};
}
function overBudgetProjects(){ return DB.projects.filter(p=>{const b=budget(p.id);return b.warn||b.crit;}); }
function matTotal(m){ const al=DB.alokasi.filter(a=>a.materialId===m.id).reduce((s,a)=>s+a.qty,0); return m.gudang+al; }
function matAlloc(m){ return DB.alokasi.filter(a=>a.materialId===m.id); }

function isLocked(pid,tgl){ return DB.harian.some(h=>h.projectId===pid&&h.tanggal===tgl&&h.status==='VERIFIED'); }
// (6) project telat dari target
function daysLate(p){ if(p.status==='SELESAI'||p.status==='HOLD') return 0; const d=(new Date(today)-new Date(p.target))/86400000; return d>0?Math.round(d):0; }

function photoThumbs(n, jam, pid){
  if(!n) return '<span class="muted">tidak ada foto</span>';
  return Array.from({length:Math.min(8,n)}).map((_,i)=>{
    const mm=String((parseInt((jam||'08:00').slice(3))+i*2)%60).padStart(2,'0');
    const lbl=(i===7&&n>8)?('+'+(n-7)):'foto';

function weekStart(){ const d=new Date(today); d.setDate(d.getDate()-6); return d.toISOString().slice(0,10); }
function weekSummary(pid){
  const ws=weekStart();
  const biaya=DB.expenses.filter(e=>e.projectId===pid&&e.tanggal>=ws).reduce((s,e)=>s+e.nominal,0)
            +DB.purchases.filter(x=>x.projectId===pid&&x.tanggal>=ws).reduce((s,x)=>s+x.total,0);
  const har=DB.harian.filter(h=>h.projectId===pid&&h.tanggal>=ws);
  const foto=har.reduce((s,h)=>s+(h.pagi?h.pagi.foto:0)+(h.sore?h.sore.foto:0),0);
  const progress=har.filter(h=>h.sore&&h.sore.progress).map(h=>({tgl:h.tanggal.slice(5),txt:h.sore.progress}));
  return {ws,biaya,foto,progress};
}

function gridRowHtml(name,r){ r=r||{}; const cols=window._grids[name];
  const cells=cols.map(c=> c.type==='select'
    ? `<td><select class="cell" data-c="${c.key}">${c.options.map(o=>`<option ${r[c.key]===o?'selected':''}>${o}</option>`).join('')}</select></td>`
    : `<td><input class="cell" data-c="${c.key}" type="${c.type||'text'}" value="${esc(r[c.key])}"></td>`).join('');
  return `<tr><td class="rownum"></td>${cells}<td><button type="button" class="btn ghost sm" onclick="this.closest('tr').remove()">×</button></td></tr>`; }
function gridAddRow(name){ document.querySelector('#grid_'+name+' tbody').insertAdjacentHTML('beforeend', gridRowHtml(name,{})); }
function openForm(title, fields, onSubmit){
  const ov=document.createElement('div'); ov.className='overlay';
  const wide=fields.some(f=>f.type==='grid')?' wide':'';
  ov.innerHTML=`<div class="modal${wide}"><h3>${title}</h3><form id="mform"></form></div>`;
  const form=ov.querySelector('#mform');
  fields.forEach(f=>{
    const wrap=document.createElement('div'); wrap.className='field';
    let inner=`<label>${f.label}</label>`;
    if(f.type==='select') inner+=`<select name="${f.name}">${f.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
    else if(f.type==='checks') inner+=`<div class="checks">${f.options.length?f.options.map(o=>`<label><input type="checkbox" name="${f.name}" value="${o}"> ${o}</label>`).join(''):'<span class="muted">tidak ada item tersedia</span>'}</div>`;
    else if(f.type==='grid'){ window._grids=window._grids||{}; window._grids[f.name]=f.columns;
      const head=f.columns.map(c=>`<th>${c.label}</th>`).join('');
      const initRows=(f.rows&&f.rows.length?f.rows:[{},{},{}]).map(r=>gridRowHtml(f.name,r)).join('');
      inner+=`<div class="row between" style="margin-bottom:4px"><span class="muted" style="font-size:11px">${f.hint||'isi beberapa baris sekaligus'}</span><button type="button" class="btn sm" onclick="gridAddRow('${f.name}')">+ Baris</button></div>
        <div style="overflow:auto"><table class="gridedit" id="grid_${f.name}"><thead><tr><th style="width:22px">#</th>${head}<th style="width:26px"></th></tr></thead><tbody>${initRows}</tbody></table></div>`; }
    else if(f.type==='textarea') inner+=`<textarea name="${f.name}" placeholder="${f.ph||''}">${f.val||''}</textarea>`;
    else if(f.type==='photo') inner+=`<div class="photos" id="photoGrid"><div class="photo add" onclick="addPhoto()">+ foto</div></div><div class="legend" id="photoCount">0 / 30 foto · auto timestamp + GPS (anti foto lama) · R2</div>`;
    else inner+=`<input name="${f.name}" type="${f.type||'text'}" placeholder="${f.ph||''}" value="${f.val||''}">`;
    wrap.innerHTML=inner; form.appendChild(wrap);
  });
  const act=document.createElement('div'); act.className='modal-actions';
  act.innerHTML=`<button type="button" class="btn ghost" id="mcancel">Batal</button><button type="submit" class="btn">Simpan</button>`;
  form.appendChild(act);
  document.body.appendChild(ov); window._photoN=0;
  ov.querySelector('#mcancel').onclick=()=>ov.remove();
  ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  form.onsubmit=e=>{ e.preventDefault(); const data={}; new FormData(form).forEach((v,k)=>data[k]=v);
    fields.forEach(f=>{ if(f.type==='checks') data[f.name]=Array.from(form.querySelectorAll(`input[name="${f.name}"]:checked`)).map(c=>c.value);
      else if(f.type==='grid'){ data[f.name]=[...form.querySelectorAll('#grid_'+f.name+' tbody tr')].map(tr=>{const o={};f.columns.forEach(c=>{const el=tr.querySelector('[data-c="'+c.key+'"]');o[c.key]=el?el.value.trim():'';});return o;}).filter(o=>Object.values(o).some(v=>v)); } });
    data._photos=window._photoN||0; ov.remove(); onSubmit(data); };
}

function rMaterial(){
  let rows='';

    rows+=`<tr class="subhead"><td colspan="7">${sub}</td></tr>`;
    rows+=items.map(m=>{
      const al=matAlloc(m); const tot=matTotal(m);
      const st=m.gudang<=m.min?(m.gudang<m.min*0.5?'red':'yellow'):'green'; const lbl=st==='red'?'Kritis':st==='yellow'?'Menipis':'Aman';
      const chips=al.map(a=>`<span class="tag">${pName(a.projectId)}: ${a.qty}</span>`).join(' ')||'<span class="muted">-</span>';
      return `<tr><td>${m.nama}</td><td>${m.satuan}</td><td><b>${m.gudang}</b> <span class="muted">/ total ${tot}</span></td><td>${chips}</td><td>${m.min}</td><td><span class="pill ${st}">${lbl}</span></td><td data-priv="finance">${fmt(tot*m.harga)}</td></tr>`;
    }).join('');

  return `

let _sigCanvas,_sigCtx,_sigDrawing=false;
function setupSigPad(){
  _sigCanvas=document.getElementById('sigPad'); _sigCtx=_sigCanvas.getContext('2d');
  _sigCtx.lineWidth=2.5; _sigCtx.lineCap='round'; _sigCtx.strokeStyle='#0f172a';
  const pos=e=>{const r=_sigCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(_sigCanvas.width/r.width),y:(t.clientY-r.top)*(_sigCanvas.height/r.height)};};
  const start=e=>{_sigDrawing=true;const p=pos(e);_sigCtx.beginPath();_sigCtx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!_sigDrawing)return;const p=pos(e);_sigCtx.lineTo(p.x,p.y);_sigCtx.stroke();e.preventDefault();};
  const end=()=>{_sigDrawing=false;};
  _sigCanvas.onmousedown=start;_sigCanvas.onmousemove=move;window.addEventListener('mouseup',end);
  _sigCanvas.ontouchstart=start;_sigCanvas.ontouchmove=move;_sigCanvas.ontouchend=end;
}
function clearSig(){ if(_sigCtx) _sigCtx.clearRect(0,0,_sigCanvas.width,_sigCanvas.height); }

  <td><button type="button" class="btn ghost sm" onclick="this.closest('tr').remove()">×</button></td></tr>`; }
function docAddRow(){ document.getElementById('ed_items').insertAdjacentHTML('beforeend', docRowHtml({})); }
function docAddCheck(){ document.getElementById('ed_checks').insertAdjacentHTML('beforeend', checkRowHtml({})); }
function docPreset(){ const d=DB.documents.find(x=>x.id===window._edDoc); const isBA=d.jenis.includes('Berita');
  if(isBA){ document.getElementById('ed_checks').innerHTML=BA_CHECK_PRESET.map(t=>checkRowHtml({item:t,done:false})).join(''); }
  else { document.getElementById('ed_items').innerHTML=(DOC_PRESETS[d.jenis]||[]).map(it=>docRowHtml(it)).join(''); }
  toast('Preset dimuat'); }
function editDoc(id){ const d=DB.documents.find(x=>x.id===id); const isBA=d.jenis.includes('Berita'); window._edDoc=id;
  const itemSection = !isBA ? `
    <div class="row between" style="margin:8px 0 4px"><label style="font-size:12px;color:var(--muted)">Daftar Barang — isi per kolom (rapi seperti Excel)</label>
      <div class="row"><button type="button" class="btn ghost sm" onclick="docPreset()">📋 Preset</button><button type="button" class="btn sm" onclick="docAddRow()">+ Baris</button></div></div>
    <div style="overflow:auto"><table class="gridedit"><thead><tr><th style="width:26px">#</th><th>Nama Barang</th><th style="width:64px">Qty</th><th style="width:76px">Satuan</th><th>Keterangan</th><th style="width:28px"></th></tr></thead><tbody id="ed_items">${(d.items||[]).map(docRowHtml).join('')}</tbody></table></div>` : '';
  const checkSection = isBA ? `
    <div class="row between" style="margin:8px 0 4px"><label style="font-size:12px;color:var(--muted)">Checklist Serah Terima</label>
      <div class="row"><button type="button" class="btn ghost sm" onclick="docPreset()">📋 Preset</button><button type="button" class="btn sm" onclick="docAddCheck()">+ Poin</button></div></div>
    <div style="overflow:auto"><table class="gridedit"><thead><tr><th style="width:40px">✔</th><th>Poin pekerjaan</th><th style="width:28px"></th></tr></thead><tbody id="ed_checks">${(d.checklist||[]).map(checkRowHtml).join('')}</tbody></table></div>` : '';
  openHTML(`<h3>Edit Dokumen — ${d.jenis.replace('Surat ','')}</h3>
    <div class="grid g2">
      <div class="field"><label>Kepada</label><input id="ed_kepada" value="${esc(d.kepada)}"></div>
      <div class="field"><label>Nomor</label><input id="ed_nomor" value="${esc(d.nomor)}"></div>
      <div class="field"><label>Tanggal</label><input id="ed_tanggal" type="date" value="${d.tanggal}"></div>
      <div class="field"><label>Periode (opsional)</label><input id="ed_periode" value="${esc(d.periode)}"></div>
    </div>
    <div class="field"><label>${isBA?'Uraian Pekerjaan':'Keterangan'}</label><textarea id="ed_uraian">${esc(d.uraian)}</textarea></div>
    ${itemSection}${checkSection}
    <div class="modal-actions"><button type="button" class="btn ghost" data-close>Batal</button><button type="button" class="btn" id="ed_save">Simpan</button></div>`, true);
  document.getElementById('ed_save').onclick=()=>saveDoc(id);
}
function saveDoc(id){ const d=DB.documents.find(x=>x.id===id); const isBA=d.jenis.includes('Berita');
  d.kepada=document.getElementById('ed_kepada').value.trim();
  d.nomor=document.getElementById('ed_nomor').value.trim();
  d.tanggal=document.getElementById('ed_tanggal').value||d.tanggal;
  d.periode=document.getElementById('ed_periode').value.trim();
  d.uraian=document.getElementById('ed_uraian').value.trim();
  if(isBA){ d.checklist=[...document.querySelectorAll('#ed_checks tr')].map(tr=>({done:tr.querySelector('.cell-chk').checked,item:tr.querySelector('[data-c=item]').value.trim()})).filter(c=>c.item); }
  else { d.items=[...document.querySelectorAll('#ed_items tr')].map(tr=>({nama:tr.querySelector('[data-c=nama]').value.trim(),qty:tr.querySelector('[data-c=qty]').value.trim(),satuan:tr.querySelector('[data-c=satuan]').value.trim(),ket:tr.querySelector('[data-c=ket]').value.trim()})).filter(it=>it.nama); }
  document.querySelector('.overlay').remove(); toast('Dokumen tersimpan rapi'); render(); viewDoc(id); }
function viewDoc(id){
  const d=DB.documents.find(x=>x.id===id); const p=DB.projects.find(x=>x.id===d.projectId)||{};
  const isBA=d.jenis.includes('Berita');
  const itemTable=d.items.length?`<table><thead><tr><th style="width:34px">No</th><th>Nama Barang</th><th style="width:120px">Jumlah</th><th>Keterangan</th></tr></thead><tbody>${d.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.nama}</td><td>${it.qty}${it.satuan?' '+it.satuan:''}</td><td>${it.ket||''}</td></tr>`).join('')}</tbody></table>`:'';
  const cl=d.checklist||[]; const allDone=cl.length&&cl.every(c=>c.done);
  const checkTable=(isBA&&cl.length)?`<div style="margin-top:6px"><b>Checklist Serah Terima:</b><table><tbody>${cl.map(c=>`<tr><td style="width:30px">${c.done?'✔':'☐'}</td><td>${c.item}</td></tr>`).join('')}</tbody></table>${!allDone?`<div style="color:#b45309;font-size:11px;margin-top:4px">⚠️ Lengkapi semua poin sebelum TTD customer.</div>`:''}</div>`:'';
  const paper=`<div class="paper">
    <div class="ph"><div class="co">AClean Service AC<small>Jl. Contoh No.123, Bekasi · 0812-xxxx-xxxx</small></div><div style="text-align:right;font-size:11px;color:#475569">Tanggal: ${d.tanggal}<br>No: ${d.nomor}</div></div>
    <h4>${d.jenis}</h4><div class="docno">Project: ${p.nama||'-'}${d.periode?` · Periode: ${d.periode}`:''}</div>
    <div class="meta"><div><b>Kepada:</b><br>${d.kepada}</div><div><b>Lokasi:</b><br>${p.lokasi||'-'}</div></div>
    ${d.uraian?`<p style="margin:6px 0"><b>${isBA?'Uraian Pekerjaan:':'Keterangan:'}</b> ${d.uraian}</p>`:''}
    ${itemTable}
    ${checkTable}
    ${isBA&&d.foto?`<div style="margin-top:6px"><b>Dokumentasi Foto:</b><div class="pf">${Array.from({length:Math.min(4,d.foto)}).map(()=>`<div>foto</div>`).join('')}</div></div>`:''}
    <div class="sign"><div><div>Diserahkan oleh,<br>Teknisi AClean</div><div class="line">${d.ttdTeknisi}</div></div><div><div>Diterima oleh,<br>${d.kepada.split('—')[0]}</div>${d.ttdCustomerImg?`<img src="${d.ttdCustomerImg}" style="height:46px;display:block;margin:6px auto -8px">`:''}<div class="line">${d.ttdCustomer}</div></div></div>
  </div>`;
  openHTML(`<div class="row between" style="margin-bottom:12px"><h3 style="margin:0">${d.jenis}</h3><span class="tag">format bisa disesuaikan</span></div>
    ${paper}
    <div class="modal-actions"><button class="btn ghost" data-close>Tutup</button><button class="btn ghost" data-priv-inline="manage" onclick="(function(){})()" id="docEditBtn">Edit</button><button class="btn" onclick="toast('(mockup) export PDF ke R2')">Cetak / PDF</button></div>`, true);
  const eb=document.getElementById('docEditBtn'); if(eb){ if(!can.manage) eb.style.display='none'; else eb.onclick=()=>{ document.querySelector('.overlay').remove(); editDoc(id); }; }
}

/* ============================================================
   NAV / ROLE
============================================================ */
function go(v){ view=v; document.querySelectorAll('#nav button[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render(); }
function goDetail(pid){ activeProject=pid; document.getElementById('projSelect').value=pid; go('detail'); }
function setActiveProject(pid){ activeProject=pid; render(); }
function setCat(c){ listCat=c; render(); }
document.getElementById('nav').addEventListener('click',e=>{const b=e.target.closest('button[data-view]');if(b)go(b.dataset.view);});
function fillProjSelect(){ const s=document.getElementById('projSelect'); s.innerHTML=DB.projects.map(p=>`<option value="${p.id}">${p.nama}</option>`).join(''); s.value=activeProject; }

function setRole(r){
  role=r; document.querySelectorAll('.role-switch button').forEach(b=>b.classList.toggle('active',b.dataset.role===r));
  const isTek=r==='Teknisi';
  document.querySelectorAll('#nav button[data-view]').forEach(b=>{
    if(b.dataset.view==='teknisi') b.style.display=isTek?'':'none';
    else b.style.display=isTek?'none':'';
  });
  document.querySelectorAll('#nav .group-label').forEach(el=>el.style.display=isTek?'none':'');
  view = isTek ? 'teknisi' : (view==='teknisi'?'dashboard':view);
  document.querySelectorAll('#nav button[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  render();
}
function applyRole(){
  document.querySelectorAll('[data-priv="finance"]').forEach(el=>el.style.display=can.finance?'':'none');
  document.querySelectorAll('[data-priv="manage"]').forEach(el=>el.style.display=can.manage?'':'none');
  document.querySelectorAll('[data-priv="expense-input"]').forEach(el=>el.style.display=can.expenseInput?'':'none');
  document.querySelectorAll('[data-priv="verify"]').forEach(el=>el.style.display=can.verify?'':'none');
  document.querySelectorAll('[data-priv="team"]').forEach(el=>el.style.display='');
  const lk=document.querySelector('[data-priv="finance-lock"]'); if(lk) lk.style.display=can.finance?'none':'';
}

fillProjSelect();
setRole('Owner');
</script>
</body>
</html>
